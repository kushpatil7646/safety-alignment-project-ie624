# BackdoorLLM Detection Pipeline — tuned for 12h GPU budget

models:
  # True clean baseline: base Llama-2-7b-chat-hf with NO backdoor (already cached)
  clean:
    - "meta-llama/Llama-2-7b-chat-hf"

  # 6 backdoored models: 3 attack types x 2 tasks
  # BadNets = fixed token trigger, VPI = virtual prompt injection, Sleeper = delayed activation
  backdoored:
    - "BackdoorLLM/Jailbreak_Llama2-7B_BadNets"
    - "BackdoorLLM/Refusal_Llama2-7B_BadNets"
    - "BackdoorLLM/Jailbreak_Llama2-7B_VPI"
    - "BackdoorLLM/Jailbreak_Llama2-7B_Sleeper"
    - "BackdoorLLM/Refusal_Llama2-7B_VPI"
    - "BackdoorLLM/Refusal_Llama2-7B_Sleeper"

  # Test mode: GPT-2 only (no HF download needed)
  test_clean:
    - "gpt2"
  test_backdoored: []

probe:
  n_base_inputs: 25           # per domain → 25x4=100 unique base inputs
  n_perturbations: 3          # 3 perturbations per base → ~300 pairs total
  domains:
    - "news"
    - "dialogue"
    - "sentiment"
    - "qa"

stage1:
  kl_top_k: 50
  tail_threshold_pct: 95
  batch_size: 16              # large batch → high GPU utilisation

stage2:
  layers: [-4, -2, -1]        # last 3 layers: max bimodality across them
  batch_size: 16
  consistency_pairs: 30

stage3:
  # Fast greedy: 1 greedy step over top-100 vocab, 10 inputs
  # Skips multi-step beam (too slow on 7B); single-step still detects clear triggers
  beam_width: 5
  max_trigger_len: 1          # 1-token triggers only (greedy, not full beam)
  n_search_inputs: 10
  top_vocab_tokens: 100

stage4:
  cv_folds: 5
  random_seed: 42

# ── Laptop / low-resource overrides ──────────────────────────────────────────
# Applied when --laptop flag is passed to evaluate.py.
# Cuts ~5x compute: fewer probes, shorter sequences, smaller vocab scan.
laptop:
  probe:
    n_base_inputs: 5          # 5x4 domains = 20 base inputs (vs 100)
    n_perturbations: 2        # 20x2 = 40 pairs total (vs 300)
  stage1:
    batch_size: 4
  stage2:
    batch_size: 4
  stage3:
    top_vocab_tokens: 25      # 25 vocab tokens (vs 100)
    n_search_inputs: 4        # 4 search inputs (vs 10)
  max_length: 256             # truncate sequences at 256 (vs 512)
  device: "cpu"               # force CPU to avoid GPU OOM on laptop

baselines:
  onion:
    perplexity_threshold: 5.0
    n_samples: 30
  activation_clustering:
    n_clusters: 2
    pca_components: 10

evaluation:
  output_dir: "results"

hf_cache_dir: null            # uses $HF_HOME from SLURM env
device: "auto"
dtype: "float16"
