# BackdoorLLM Detection Pipeline — tuned for 12h GPU budget

models:
  # 2 clean baselines (same base model, no backdoor)
  clean:
    - "BackdoorLLM/Jailbreak_Llama2-7B_BadNets"    # will use as clean ref (see note)
    - "BackdoorLLM/Refusal_Llama2-7B_BadNets"

  # 4 backdoored: 2 attack types x 2 tasks (Jailbreak + Refusal)
  backdoored:
    - "BackdoorLLM/Jailbreak_Llama2-7B_VPI"
    - "BackdoorLLM/Jailbreak_Llama2-7B_Sleeper"
    - "BackdoorLLM/Refusal_Llama2-7B_VPI"
    - "BackdoorLLM/Refusal_Llama2-7B_Sleeper"

  # Test mode: GPT-2 only (no HF download needed)
  test_clean:
    - "gpt2"
  test_backdoored: []

probe:
  n_base_inputs: 25           # per domain → 25x4=100 unique base inputs
  n_perturbations: 3          # 3 perturbations per base → ~300 pairs total
  domains:
    - "news"
    - "dialogue"
    - "sentiment"
    - "qa"

stage1:
  kl_top_k: 50
  tail_threshold_pct: 95
  batch_size: 16              # large batch → high GPU utilisation

stage2:
  layers: [-1]                # only last layer (fastest, most informative)
  batch_size: 16
  consistency_pairs: 30

stage3:
  # Fast greedy: 1 greedy step over top-100 vocab, 10 inputs
  # Skips multi-step beam (too slow on 7B); single-step still detects clear triggers
  beam_width: 5
  max_trigger_len: 1          # 1-token triggers only (greedy, not full beam)
  n_search_inputs: 10
  top_vocab_tokens: 100

stage4:
  cv_folds: 5
  random_seed: 42

baselines:
  onion:
    perplexity_threshold: 5.0
    n_samples: 30
  activation_clustering:
    n_clusters: 2
    pca_components: 10

evaluation:
  output_dir: "results"

hf_cache_dir: null            # uses $HF_HOME from SLURM env
device: "auto"
dtype: "float16"
