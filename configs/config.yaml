# BackdoorLLM Detection Pipeline Configuration

models:
  # Clean baseline models
  clean:
    - "BackdoorLLM/Llama-2-7b-chat-hf-BadNL-clean-SST2"
    - "BackdoorLLM/Llama-2-7b-chat-hf-BadNL-clean-AG"

  # Backdoored models (various attack types)
  backdoored:
    - "BackdoorLLM/Llama-2-7b-chat-hf-BadNL-BadWords-SST2"
    - "BackdoorLLM/Llama-2-7b-chat-hf-BadNL-BadSent-SST2"
    - "BackdoorLLM/Llama-2-7b-chat-hf-VPI-VPI-SST2"
    - "BackdoorLLM/Llama-2-7b-chat-hf-StyleBkd-StyleBkd-SST2"

  # Fallback: use smaller GPT2 for quick local testing
  test_clean:
    - "gpt2"
  test_backdoored: []

probe:
  n_base_inputs: 100          # number of base inputs per domain
  n_perturbations: 5          # perturbations per base input
  max_new_tokens: 50          # tokens to generate per forward pass
  domains:
    - "news"
    - "dialogue"
    - "sentiment"
    - "qa"
  perturbation_types:
    - "paraphrase"
    - "token_substitution"
    - "prefix_injection"
    - "style_casual"
    - "style_formal"

stage1:
  kl_top_k: 50               # top-k logits for KL computation
  tail_threshold_pct: 95     # percentile for heavy-tail test

stage2:
  layers: [-1, -4, -8]       # transformer layers to extract (negative = from end)
  pca_components: 50         # PCA before UMAP
  umap_components: 2
  gmm_components: 2
  consistency_pairs: 50      # pairs for representation consistency score

stage3:
  beam_width: 10             # beam search width
  max_trigger_len: 5         # max trigger token length
  n_search_inputs: 20        # inputs to average over during search
  top_vocab_tokens: 500      # restrict search to top-N frequent tokens

stage4:
  test_split: 0.3
  cv_folds: 5
  random_seed: 42

baselines:
  onion:
    perplexity_threshold: 100.0
    n_samples: 50
  activation_clustering:
    n_clusters: 2
    pca_components: 10

evaluation:
  metrics:
    - "auroc"
    - "fpr_at_95tpr"
    - "accuracy"
    - "f1"
  output_dir: "results"

hf_cache_dir: "/scratch/hf_cache"   # set to writable path on server
device: "auto"                       # "auto", "cuda", "cpu"
dtype: "float16"                     # float16 for GPU, float32 for CPU
